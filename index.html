<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirWatch KSA</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060a12;
            --panel: #0c1220;
            --border: #162035;
            --accent: #00d4ff;
            --text: #ddeeff;
            --muted: #3a4f70;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: "Tajawal", sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 32px; height: 32px; border: 2px solid var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.3); } 50% { box-shadow: 0 0 22px rgba(0,212,255,0.7); } }
        
        .legend { display: flex; gap: 8px; flex-wrap: wrap; }
        .li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); font-family: monospace; }
        .ld { width: 8px; height: 8px; border-radius: 50%; }

        .map-section { flex: 1; display: flex; justify-content: center; align-items: center; padding: 12px; background: var(--bg); position: relative; }
        .map-wrap { position: relative; display: inline-block; }
        .map-img { display: block; width: 100%; max-width: 764px; border-radius: 10px; border: 1px solid var(--border); }

        .pin { position: absolute; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .pin-dot { border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: 700; font-size: 8px; transition: 0.2s; }
        .pin-label { font-size: 9px; color: #fff; background: rgba(0,0,0,0.82); padding: 1px 4px; border-radius: 3px; margin-top: 2px; border: 1px solid rgba(255,255,255,0.1); }

        /* تعديل التقرير لإصلاح الشفافية الملحوظة في image_2.png */
        #rep { 
            position: fixed; 
            inset: 0; 
            background: #060a12; /* لون أسود معتم بالكامل لمنع تداخل الخريطة */
            z-index: 9999; 
            overflow-y: auto; 
            display: none; 
            opacity: 0;
            transition: opacity 0.3s;
        }
        #rep.show { display: block; opacity: 1; }
        
        .rw { max-width: 760px; margin: 0 auto; padding: 20px; }
        .back-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; }
        .back-btn:hover { color: var(--accent); border-color: var(--accent); }
        
        .rh { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 22px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .rc { font-size: 26px; font-weight: 900; }
        .raqi { font-size: 60px; font-weight: 900; font-family: monospace; line-height: 1; }
        
        .pg { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 9px; margin-bottom: 14px; }
        .pc { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 9px; }
        .pv { font-size: 20px; font-weight: 900; font-family: monospace; }
        .pb { height: 3px; background: var(--border); border-radius: 2px; margin-top: 7px; overflow: hidden; }
        .pf { height: 100%; border-radius: 2px; }

        .tc { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ib { background: var(--panel); border: 1px solid var(--border); padding: 14px; border-radius: 9px; }
        .cr { height: 80px; display: flex; align-items: flex-end; gap: 3px; margin-top: 6px; }
        .bw { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bv { width: 100%; border-radius: 2px 2px 0 0; }
        
        .ind-tag { font-size: 9px; color: #ff3355; background: rgba(255,51,85,0.1); border: 1px solid rgba(255,51,85,0.3); padding: 2px 7px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .hr { display: flex; align-items: center; gap: 9px; padding: 7px 9px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">
        <div class="logo-icon">🌬️</div>
        <div><h1 style="font-size:17px; font-weight:900;">AirWatch <span style="color:var(--accent)">KSA</span></h1></div>
    </div>
    <div class="legend">
        <div class="li"><div class="ld" style="background:#39ff14"></div> جيد</div>
        <div class="li"><div class="ld" style="background:#ffe600"></div> مقبول</div>
        <div class="li"><div class="ld" style="background:#ff3355"></div> ملوث</div>
    </div>
</div>

<div class="map-section">
    <div class="map-wrap" id="mapWrap">
        <!-- الخريطة المشار إليها بـ image.png -->
        <img class="map-img" id="mapImg" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQ..." alt="KSA Map">
    </div>
</div>

<div id="rep">
    <div class="rw">
        <button class="back-btn" onclick="closeRep()">→ العودة للخريطة</button>
        <div class="rh">
            <div>
                <div style="font-size:9px; color:var(--muted); letter-spacing:2px; margin-bottom:3px;">تقرير جودة الهواء</div>
                <div class="rc" id="rc"></div>
                <div id="rr" style="color:var(--muted); font-size:11px; font-family:monospace;"></div>
                <div id="ri" class="ind-tag" style="display:none">🏭 منطقة صناعية</div>
            </div>
            <div style="text-align:center">
                <div class="raqi" id="raqi"></div>
                <div style="font-size:9px; letter-spacing:3px; color:var(--muted); font-family:monospace;">AQI</div>
            </div>
        </div>
        <div style="font-size:10px; color:var(--muted); font-family:monospace; margin-bottom:10px;">// الملوثات الرئيسية</div>
        <div class="pg" id="rpg"></div>
        <div class="tc">
            <div class="ib"><div style="font-size:10px; color:var(--muted); font-family:monospace;">// التاريخ (8 ساعات)</div><div class="cr" id="rch"></div></div>
            <div class="ib"><div style="font-size:10px; color:var(--muted); font-family:monospace;">// التوصيات الصحية</div><div id="rhl" style="display:flex; flex-direction:column; gap:6px;"></div></div>
        </div>
    </div>
</div>

<script>
    const cities = [
        {id:"riyadh", name:"الرياض", region:"منطقة الرياض", lat:24.69, lng:46.72, aqi:[80, 160], ind:false},
        {id:"makkah", name:"مكة المكرمة", region:"منطقة مكة المكرمة", lat:21.39, lng:39.86, aqi:[60, 110], ind:false},
        {id:"dammam", name:"الدمام الصناعية", region:"المنطقة الشرقية", lat:26.50, lng:49.95, aqi:[150, 230], ind:true},
        {id:"abha", name:"أبها", region:"منطقة عسير", lat:18.22, lng:42.51, aqi:[20, 60], ind:false},
        {id:"tabuk", name:"تبوك", region:"منطقة تبوك", lat:28.38, lng:36.57, aqi:[50, 100], ind:false},
        {id:"jeddah", name:"جدة", region:"منطقة مكة المكرمة", lat:21.54, lng:39.17, aqi:[70, 130], ind:false}
    ];

    const MAP_LIMITS = { latMax: 32.8, latMin: 15.2, lngMin: 33.8, lngMax: 57.0 };

    function ll2pct(lat, lng) {
        const x = ((lng - MAP_LIMITS.lngMin) / (MAP_LIMITS.lngMax - MAP_LIMITS.lngMin)) * 100;
        const y = ((MAP_LIMITS.latMax - lat) / (MAP_LIMITS.latMax - MAP_LIMITS.latMin)) * 100;
        return { x, y };
    }

    function getAqiInfo(v) {
        if(v <= 50) return { l: "جيد", c: "#39ff14" };
        if(v <= 100) return { l: "مقبول", c: "#ffe600" };
        if(v <= 150) return { l: "حساسين", c: "#ff8c00" };
        return { l: "غير صحي", c: "#ff3355" };
    }

    function renderPins() {
        const wrap = document.getElementById("mapWrap");
        cities.forEach(c => {
            const val = Math.floor(Math.random() * (c.aqi[1] - c.aqi[0])) + c.aqi[0];
            const info = getAqiInfo(val);
            const pos = ll2pct(c.lat, c.lng);
            
            const pin = document.createElement("div");
            pin.className = "pin";
            pin.style.left = pos.x + "%";
            pin.style.top = pos.y + "%";
            pin.innerHTML = `
                <div class="pin-dot" style="width:18px; height:18px; color:${info.c}; border-color:${info.c}; background:rgba(12, 18, 32, 0.8)">${val}</div>
                <div class="pin-label">${c.name}</div>
            `;
            pin.onclick = () => openRep(c, val);
            wrap.appendChild(pin);
        });
    }

    function openRep(c, val) {
        const info = getAqiInfo(val);
        document.getElementById("rc").innerText = c.name;
        document.getElementById("rr").innerText = c.region;
        document.getElementById("raqi").innerText = val;
        document.getElementById("raqi").style.color = info.c;
        document.getElementById("ri").style.display = c.ind ? "inline-block" : "none";
        
        // محاكاة الملوثات
        const rpg = document.getElementById("rpg");
        rpg.innerHTML = "";
        ["PM2.5", "PM10", "CO", "NO2"].forEach(p => {
            const pVal = Math.floor(Math.random() * 60) + 10;
            rpg.innerHTML += `<div class="pc"><div style="font-size:9px; color:var(--muted); font-family:monospace; margin-bottom:5px;">${p}</div><div class="pv" style="color:${info.c}">${pVal}</div><div class="pb"><div class="pf" style="width:${pVal}%; background:${info.c}"></div></div></div>`;
        });

        // الرسوم البيانية للتاريخ
        const rch = document.getElementById("rch");
        rch.innerHTML = "";
        for(let i=0; i<8; i++){
            const hVal = Math.floor(Math.random() * 100);
            rch.innerHTML += `<div class="bw"><div class="bv" style="height:${hVal}%; background:var(--muted); opacity:0.3"></div></div>`;
        }

        const rep = document.getElementById("rep");
        rep.style.display = "block";
        setTimeout(() => rep.classList.add("show"), 10);
    }

    function closeRep() {
        const rep = document.getElementById("rep");
        rep.classList.remove("show");
        setTimeout(() => rep.style.display = "none", 300);
    }

    window.onload = renderPins;
</script>
</body>
</html>
